# GB Internovel native key mapping overrides
# Format:
#   joy.<button_index>=<BUTTON_NAME>
#   pad.<button_index>=<BUTTON_NAME>
#
# BUTTON_NAME:
#   UP DOWN LEFT RIGHT A B X Y L1 R1 START SELECT MENU NONE
#
# Desktop keyboard defaults:
#   Arrow keys -> D-pad
#   Enter -> A / confirm
#   Escape -> B / cancel
#
# Example H700-style override:
# joy.0=A
# joy.1=B
# joy.2=X
# joy.3=Y
# joy.4=L1
# joy.5=R1
# joy.6=SELECT
# joy.7=START
